name: Check

on:
  pull_request:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flake-check:
    name: Flake check
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Check flake outputs
        run: nix flake check --no-build --show-trace --accept-flake-config

  nixos-eval:
    name: Evaluate ${{ matrix.host }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: rabanastre
            attribute: nixosConfigurations.rabanastre.config.system.build.toplevel.drvPath
          - host: valendia
            attribute: nixosConfigurations.valendia.config.system.build.toplevel.drvPath

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Evaluate ${{ matrix.host }}
        run: nix eval ".#${{ matrix.attribute }}" --raw --show-trace --accept-flake-config

  darwin-eval:
    name: Evaluate Darwin
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Evaluate LT-US24-MAC-137
        run: nix eval .#darwinConfigurations.LT-US24-MAC-137.system.drvPath --raw --show-trace --accept-flake-config
