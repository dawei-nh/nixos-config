name: Update flake lock

on:
  workflow_dispatch:
  schedule:
    # Sunday night in America/Chicago: 22:00 CST or 23:00 CDT.
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  update:
    name: Update flake inputs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.UPDATE_FLAKE_APP_ID }}
          private-key: ${{ secrets.UPDATE_FLAKE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Get GitHub App bot user ID
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "id=$(gh api '/users/${{ steps.app-token.outputs.app-slug }}[bot]' --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Update flake inputs
        run: nix flake update --accept-flake-config

      - name: Open pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: Update flake inputs
          title: Update flake inputs
          body: |
            Automated weekly flake input update.

            This PR is intended to auto-merge after the repository's required
            GitHub Actions checks pass.
          branch: chore/update-flake-lock
          base: main
          delete-branch: true
          add-paths: flake.lock
          author: "${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.app-user.outputs.id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>"
          committer: "${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.app-user.outputs.id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>"

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --squash --auto --delete-branch "${{ steps.create-pr.outputs.pull-request-number }}"
