name: Update flake lock

on:
  workflow_dispatch:
  schedule:
    # Sunday night in America/Chicago: 22:00 CST or 23:00 CDT.
    - cron: "0 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update flake inputs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Update flake inputs
        run: nix flake update --accept-flake-config

      - name: Open pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: Update flake inputs
          title: Update flake inputs
          body: |
            Automated weekly flake input update.

            This PR is intended to auto-merge after the repository's required
            GitHub Actions checks pass.
          branch: chore/update-flake-lock
          base: main
          delete-branch: true
          add-paths: flake.lock
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --squash --auto --delete-branch "${{ steps.create-pr.outputs.pull-request-number }}"
